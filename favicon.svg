<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- background -->
  <circle cx="16" cy="16" r="15" fill="#d4d0c4"/>

  <!-- zombie head -->
  <ellipse cx="16" cy="15" rx="6" ry="7" fill="#8fa87a"/>
  <!-- jaw / chin slightly darker -->
  <ellipse cx="16" cy="20" rx="5" ry="3" fill="#7d9469"/>
  <!-- skull top highlight -->
  <ellipse cx="15" cy="11" rx="3" ry="2" fill="#a0bb8a" opacity="0.5"/>

  <!-- eyes — hollow dark sockets -->
  <rect x="12" y="13" width="3" height="3" fill="#1a1a1a"/>
  <rect x="17" y="13" width="3" height="3" fill="#1a1a1a"/>
  <!-- bloodshot glint -->
  <rect x="12" y="13" width="1" height="1" fill="#882222"/>
  <rect x="17" y="13" width="1" height="1" fill="#882222"/>

  <!-- mouth — jagged -->
  <rect x="13" y="18" width="6" height="2" fill="#1a1a1a"/>
  <rect x="14" y="17" width="1" height="1" fill="#1a1a1a"/>
  <rect x="16" y="17" width="1" height="1" fill="#1a1a1a"/>
  <rect x="14" y="20" width="1" height="1" fill="#1a1a1a"/>
  <rect x="16" y="20" width="1" height="1" fill="#1a1a1a"/>

  <!-- reticle outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#cc2222" stroke-width="1.5"/>
  <!-- reticle inner ring -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#cc2222" stroke-width="1"/>

  <!-- crosshair lines, gapped at inner ring -->
  <line x1="16" y1="2"  x2="16" y2="7"  stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="25" x2="16" y2="30" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2"  y1="16" x2="7"  y2="16" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="16" x2="30" y2="16" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
</svg>
