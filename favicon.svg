<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <circle cx="16" cy="16" r="15" fill="#d4d0c4"/>

  <!-- checkmark -->
  <polyline points="7,16 13,22 25,9" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- reticle outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#cc2222" stroke-width="1.5"/>
  <!-- reticle inner ring -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#cc2222" stroke-width="1"/>

  <!-- crosshair lines, gapped at inner ring -->
  <line x1="16" y1="2"  x2="16" y2="7"  stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="25" x2="16" y2="30" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2"  y1="16" x2="7"  y2="16" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="16" x2="30" y2="16" stroke="#cc2222" stroke-width="1.5" stroke-linecap="round"/>
</svg>
