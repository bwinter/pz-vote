<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PZ Vote — Server Settings</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1e1e;--bg2:#252526;--bg3:#2a2d2e;--bg4:#1a1a1a;
  --border:#333;--border2:#2a2a2a;
  --text:#cccccc;--dim:#8f9aa4;--key:#9cdcfe;--group:#c586c0;
  --file:#569cd6;--avg:#dcdcaa;
  --p0:#4f9ede;--p1:#c58bc0;--p2:#4ec9b0;
  --p0d:#1f4a70;--p1d:#5a3860;--p2d:#1b5a50;
  --accent:#007acc;
  --ind:16px;--icon-w:20px;--key-w:220px;--avg-w:76px;
  --key-offset:288px;
  --row-h:26px;--toolbar-h:38px;--header-h:28px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:auto;}
#toolbar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:300;min-height:var(--toolbar-h);flex-wrap:wrap;}
#settings-panel{display:flex;align-items:center;gap:10px;overflow:hidden;max-width:0;transition:max-width .2s ease;white-space:nowrap;}
#settings-panel.open{max-width:600px;}
.settings-label{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px;white-space:nowrap;}
.settings-note{font-size:10px;color:#555;}
.settings-token{padding:3px 8px;background:#2d2d2d;border:1px solid #555;border-radius:3px;color:var(--text);font-size:12px;width:180px;font-family:inherit;}
.settings-token:focus{outline:none;border-color:var(--accent);}
.settings-token.has-token{border-color:#3a8a3a;}
.settings-actions{display:flex;gap:6px;}
.btn-settings{background:#3a3a3a;}
.btn{padding:5px 16px;background:var(--accent);color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0;font-family:inherit;line-height:1.4;}
.btn:hover{filter:brightness(1.15);}
.btn:active{filter:brightness(0.9);}
.btn-save{background:#2d7a2d;min-width:110px;}
.btn-reload{background:#505050;min-width:110px;}
.btn-icon{padding:2px 6px;border:none;border-radius:2px;cursor:pointer;font-size:11px;line-height:1.5;background:#3a3a3a;color:#fff;flex-shrink:0;font-family:inherit;}
.btn-icon:hover{filter:brightness(1.25);}
.btn-icon:active{filter:brightness(0.9);}
.btn-icon-save{background:#2d6b2d;}
.btn-icon-reload{background:#484848;}
.player-col{display:flex;flex-direction:column;gap:3px;min-width:130px;}
.p-input{width:100%;padding:2px 5px;background:#2d2d2d;border:1px solid #555;border-bottom:2px solid #555;color:var(--text);border-radius:2px;font-size:12px;font-family:'Consolas','Cascadia Code',monospace;}
.p-input:focus{outline:none;border-color:var(--accent);}
#p0{border-bottom-color:var(--p0);}
#p1{border-bottom-color:var(--p1);}
#p2{border-bottom-color:var(--p2);}
.p-preset{width:100%;padding:2px 4px;background:#2d2d2d;border:1px solid #444;color:var(--text);border-radius:2px;font-size:10px;cursor:pointer;font-family:inherit;}
.p-preset:focus{outline:none;border-color:var(--accent);}
select option{background:#2d2d2d;color:var(--text);}
#col-header{display:flex;align-items:stretch;background:var(--bg4);border-bottom:1px solid var(--border);position:sticky;top:var(--toolbar-h);z-index:290;font-size:11px;min-height:var(--header-h);}
.ch-spacer{width:var(--key-offset);flex-shrink:0;display:flex;flex-direction:column;justify-content:flex-start;padding:5px 8px;gap:3px;}
.ch-label{font-family:'Consolas','Cascadia Code',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;min-height:22px;}
.ch-label-action{color:var(--text);text-transform:none;letter-spacing:0;opacity:.75;}
.ch-p{flex:1;min-width:100px;display:flex;flex-direction:column;gap:3px;padding:5px 5px;border-left:1px solid var(--border2);}
.ch-p-row{display:flex;align-items:center;gap:3px;min-height:22px;}
.btn-icon-full{width:100%;text-align:center;padding:3px 6px;}
.ch-avg{width:var(--avg-w);flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 8px 5px 4px;gap:3px;}
.ch-avg-label{color:var(--avg);text-transform:uppercase;letter-spacing:.06em;font-size:10px;padding:2px 6px;line-height:1.5;border-radius:2px;display:flex;align-items:center;min-height:22px;}
.t-children.collapsed{display:none;}
.t-row,.s-row{display:flex;align-items:center;min-height:var(--row-h);padding:1px 0;}
.t-row{cursor:pointer;}
.t-row:hover,.s-row:hover{background:var(--bg3);}
.t-indent{width:var(--ind);flex-shrink:0;}
.t-icon{width:var(--icon-w);flex-shrink:0;font-size:9px;color:var(--dim);text-align:center;user-select:none;}
.lbl-file{font-family:'Consolas','Cascadia Code',monospace;color:var(--file);font-size:13px;font-weight:700;padding:0 4px;user-select:none;}
.lbl-group{font-family:'Consolas','Cascadia Code',monospace;color:var(--group);font-size:12px;padding:0 4px;user-select:none;}
.b42-tag{font-size:9px;color:#ce9178;opacity:.8;font-style:italic;margin-left:5px;}
.s-head{width:var(--key-offset);flex-shrink:0;display:flex;align-items:center;min-height:var(--row-h);min-width:0;position:relative;}
.s-head[data-tip]{cursor:help}
.s-head>.t-indent{flex-shrink:0}
.s-head>.t-icon{flex-shrink:0}
.s-head>.s-key{flex:1;min-width:0;width:auto;max-width:none}
.s-key{font-family:'Consolas','Cascadia Code',monospace;font-size:12px;color:var(--key);padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-info-slot{width:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.info-btn{opacity:.55}
.s-head[data-tip]:hover .info-btn,.s-head[data-tip]:focus-within .info-btn{opacity:1}
.s-key.b42{color:#ce9178;}
.sliders-wrap{display:flex;flex:1;align-items:center;min-width:0;}
.p-col{display:flex;align-items:center;flex:1;min-width:100px;padding:0 5px;gap:4px;border-left:1px solid var(--border2);}
.s-avg{width:var(--avg-w);flex-shrink:0;font-family:'Consolas','Cascadia Code',monospace;font-size:11px;color:var(--avg);text-align:right;padding-right:12px;white-space:nowrap;}
.p-select{flex:1;min-width:60px;background:#2d2d2d;border:1px solid #555;color:var(--text);font-size:11px;font-family:'Consolas','Cascadia Code',monospace;padding:1px 2px;cursor:pointer;border-radius:2px;}
.p-select:focus{outline:none;border-color:var(--accent);}
.p-num{flex:1;min-width:50px;background:#2d2d2d;border:1px solid #555;color:var(--text);font-size:11px;font-family:'Consolas','Cascadia Code',monospace;padding:1px 4px;border-radius:2px;}
.p-num:focus{outline:none;border-color:var(--accent);}
input[type=checkbox].p-check{width:14px;height:14px;cursor:pointer;}
.p-col:nth-child(1) .p-select{border-bottom:2px solid var(--p0d);}
.p-col:nth-child(2) .p-select{border-bottom:2px solid var(--p1d);}
.p-col:nth-child(3) .p-select{border-bottom:2px solid var(--p2d);}
.p-col:nth-child(1) .p-num{border-bottom:2px solid var(--p0d);}
.p-col:nth-child(2) .p-num{border-bottom:2px solid var(--p1d);}
.p-col:nth-child(3) .p-num{border-bottom:2px solid var(--p2d);}
#status{font-size:11px;color:var(--dim);padding:3px 10px;background:var(--bg2);border-bottom:1px solid var(--border2);}
.save-ok{color:#4ec9b0 !important;}
.warn{color:#dcdcaa !important;}
.info-btn{width:15px;height:15px;border-radius:50%;border:1px solid #555;background:transparent;color:var(--dim);font-size:9px;cursor:help;line-height:1;padding:0;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.info-btn:hover,.info-btn:focus-visible{border-color:#9cdcfe;color:#9cdcfe;outline:none;}
.info-tip{display:none;position:absolute;left:calc(100% + 6px);top:50%;transform:translateY(-50%);z-index:500;background:#1e2a35;border:1px solid #4a6478;border-radius:4px;padding:7px 10px;width:270px;font-size:11px;color:#cdd6e0;line-height:1.5;white-space:normal;font-family:'Segoe UI',system-ui,sans-serif;box-shadow:0 3px 12px rgba(0,0,0,.7);pointer-events:none;}
.s-head[data-tip]:hover .info-tip,.s-head[data-tip]:focus-within .info-tip{display:block;}
</style>
</head>
<body>
<div id="toolbar">
  <button class="btn btn-settings" id="btn-settings" title="Settings — token, refresh, save all">⚙️ Settings</button>
  <div id="settings-panel">
    <label class="settings-label">
      <span class="settings-note">GitHub token</span>
      <input id="gh-token" type="password" class="settings-token" placeholder="paste token here" title="Your GitHub personal access token">
    </label>
    <div class="settings-actions">
      <button class="btn btn-reload" id="btn-reset" title="Re-fetch all configs from GitHub">☁️ Refresh All</button>
      <button class="btn btn-save" id="btn-save" title="Save all 3 players + averages to GitHub">☁️ Save All</button>
    </div>
  </div>
</div>
<div id="col-header">
  <div class="ch-spacer">
    <span class="ch-label">Player name</span>
    <span class="ch-label">Preset</span>
    <span class="ch-label ch-label-action">☁️ saves your column</span>
    <span class="ch-label ch-label-action">🔄 reloads your column</span>
  </div>
  <div class="ch-p">
    <div class="ch-p-row"><input class="p-input" id="p0" value="Diesel" style="flex:1;"></div>
    <div class="ch-p-row"><select class="p-preset" id="preset0" style="flex:1;"><option value="">Defaults</option><option value="apocalypse">Apocalypse</option><option value="outbreak">Outbreak</option><option value="extinction">Extinction</option><option value="rising">Rising</option><option value="sixmonthslater">Six Months Later</option><option value="custom">Custom</option></select></div>
    <div class="ch-p-row"><button class="btn-icon btn-icon-save btn-icon-full" id="btn-save-0" title="Save Diesel's votes to GitHub">☁️ Save</button></div>
    <div class="ch-p-row"><button class="btn-icon btn-icon-reload btn-icon-full" id="btn-reload-0" title="Reload Diesel's votes from GitHub">🔄 Reload</button></div>
  </div>
  <div class="ch-p">
    <div class="ch-p-row"><input class="p-input" id="p1" value="GunFox" style="flex:1;"></div>
    <div class="ch-p-row"><select class="p-preset" id="preset1" style="flex:1;"><option value="">Defaults</option><option value="apocalypse">Apocalypse</option><option value="outbreak">Outbreak</option><option value="extinction">Extinction</option><option value="rising">Rising</option><option value="sixmonthslater">Six Months Later</option><option value="custom">Custom</option></select></div>
    <div class="ch-p-row"><button class="btn-icon btn-icon-save btn-icon-full" id="btn-save-1" title="Save GunFox's votes to GitHub">☁️ Save</button></div>
    <div class="ch-p-row"><button class="btn-icon btn-icon-reload btn-icon-full" id="btn-reload-1" title="Reload GunFox's votes from GitHub">🔄 Reload</button></div>
  </div>
  <div class="ch-p">
    <div class="ch-p-row"><input class="p-input" id="p2" value="SnowCrash" style="flex:1;"></div>
    <div class="ch-p-row"><select class="p-preset" id="preset2" style="flex:1;"><option value="">Defaults</option><option value="apocalypse">Apocalypse</option><option value="outbreak">Outbreak</option><option value="extinction">Extinction</option><option value="rising">Rising</option><option value="sixmonthslater">Six Months Later</option><option value="custom">Custom</option></select></div>
    <div class="ch-p-row"><button class="btn-icon btn-icon-save btn-icon-full" id="btn-save-2" title="Save SnowCrash's votes to GitHub">☁️ Save</button></div>
    <div class="ch-p-row"><button class="btn-icon btn-icon-reload btn-icon-full" id="btn-reload-2" title="Reload SnowCrash's votes from GitHub">🔄 Reload</button></div>
  </div>
  <div class="ch-avg">
    <span class="ch-avg-label">avg</span>
  </div>
</div>
<div id="status">Loading game files...</div>
<div id="tree"></div>
<script>
// ─── LOOT SNAP LABELS (keys match Apocalypse.lua factor names) ────────
const LOOT_FACTOR_LABELS = {
  InsaneLootFactor:'Insane', ExtremeLootFactor:'Extreme rare',
  RareLootFactor:'Rare', NormalLootFactor:'Normal',
  CommonLootFactor:'Common', AbundantLootFactor:'Abundant',
};

// ─── MUTABLE STATE (populated by loadGameFiles) ───────────────────────
let SCHEMA=[], PRESETS={}, LOOT_SNAPS=[];
let settingMap={}, values=[], collapsed={};

// ─── VALUE HELPERS ────────────────────────────────────────────────────
function nearestLootSnap(v){
  if(!LOOT_SNAPS.length) return v;
  return LOOT_SNAPS.reduce((best,[sv])=>Math.abs(v-sv)<Math.abs(v-best)?sv:best,LOOT_SNAPS[0][0]);
}
function lootLabel(v){
  const snap=LOOT_SNAPS.find(([sv])=>Math.abs(v-sv)<0.001);
  return snap?snap[1]:'~'+parseFloat(v.toFixed(2));
}
function clamp(s,v){
  if(s.type==='bool') return v>=0.5?1:0;
  if(s.type==='enum') return Math.max(1,Math.min(s.options.length,Math.round(v)));
  if(s.type==='lootSelect') return nearestLootSnap(v);
  return v;
}
function fmtDisplay(s,v){
  if(s.type==='bool') return v>=0.5?'on':'off';
  if(s.type==='lootSelect') return lootLabel(v);
  if(s.type==='enum'){const i=Math.round(v)-1;return s.options[Math.max(0,Math.min(s.options.length-1,i))]||String(Math.round(v));}
  const n=parseFloat(v);
  if(n===Math.floor(n)&&Math.abs(n)<1e9) return String(Math.floor(n));
  return parseFloat(n.toFixed(2)).toString();
}
function fmtFile(s,v){
  if(s.type==='bool') return v>=0.5?'true':'false';
  if(s.type==='lootSelect') return parseFloat(nearestLootSnap(v).toFixed(2)).toString();
  if(s.type==='enum') return String(Math.round(v));
  const n=parseFloat(v);
  if(n===Math.floor(n)&&Math.abs(n)<1e9) return String(Math.floor(n));
  return parseFloat(n.toFixed(2)).toString();
}
function avg3(s,a,b,c){
  const x=(a+b+c)/3;
  if(s.type==='bool'||s.type==='enum') return Math.round(x);
  if(s.type==='lootSelect') return nearestLootSnap(x);
  return x;
}

// ─── INIT / PRESET ────────────────────────────────────────────────────
function initValues(){
  values=[{},{},{}];
  for(const f of SCHEMA) for(let p=0;p<3;p++){
    values[p][f.id]={};
    for(const g of f.groups) for(const s of g.settings) values[p][f.id][s.key]=s.def;
  }
}
function applyPreset(pi,name){
  if(!name){
    for(const f of SCHEMA) for(const g of f.groups) for(const s of g.settings) values[pi][f.id][s.key]=s.def;
    rebuildControls();
    setStatus('Reset '+(document.getElementById('p'+pi).value||'Player '+(pi+1))+' to defaults');
    return;
  }
  const pr=PRESETS[name]; if(!pr) return;
  if(pr.sandbox) for(const[k,v] of Object.entries(pr.sandbox)){const s=settingMap['sandbox']?.[k];if(s) values[pi]['sandbox'][k]=clamp(s,v);}
  if(pr.ini) for(const[k,v] of Object.entries(pr.ini)){const s=settingMap['ini']?.[k];if(s) values[pi]['ini'][k]=clamp(s,v);}
  rebuildControls();
  const note=pr.note?' — '+pr.note:'';
  setStatus('"'+name+'" applied to '+(document.getElementById('p'+pi).value||'Player '+(pi+1))+note,'warn');
}
function presetMatches(pi,pr){
  for(const fid of['ini','sandbox']){
    const psec=fid==='ini'?pr.ini:pr.sandbox;
    const f=SCHEMA.find(x=>x.id===fid); if(!f) continue;
    for(const g of f.groups) for(const s of g.settings){
      const pv=psec?.[s.key];
      const cur=values[pi][fid][s.key];
      if(pv!==undefined){if(Math.abs(cur-clamp(s,pv))>0.001) return false;}
      else{if(Math.abs(cur-s.def)>0.001) return false;}
    }
  }
  return true;
}
function detectPreset(pi){
  let isDefault=true;
  outer:for(const f of SCHEMA) for(const g of f.groups) for(const s of g.settings)
    if(Math.abs(values[pi][f.id][s.key]-s.def)>0.001){isDefault=false;break outer;}
  if(isDefault) return '';
  for(const[name,pr] of Object.entries(PRESETS)) if(presetMatches(pi,pr)) return name;
  return 'custom';
}
function updatePresetDropdowns(){
  for(let i=0;i<3;i++) document.getElementById('preset'+i).value=detectPreset(i);
}

// ─── HELPERS ──────────────────────────────────────────────────────────
function getNames(){return[0,1,2].map(i=>document.getElementById('p'+i).value.trim()||'Player'+(i+1));}
function setStatus(m,c){const e=document.getElementById('status');e.textContent=m;e.className=c||'';}
function mkI(){const s=document.createElement('span');s.className='t-indent';return s;}

// ─── PARSE ────────────────────────────────────────────────────────────
function parseIni(text){
  const r={};
  for(const line of text.split('\n')){if(line.startsWith('#')) continue;const eq=line.indexOf('=');if(eq>0) r[line.slice(0,eq).trim()]=line.slice(eq+1).trim();}
  return r;
}
function parseLua(text){
  const r={};let tbl=null;
  for(const raw of text.split('\n')){
    const line=raw.trim();
    const tm=line.match(/^(\w+)\s*=\s*\{/);if(tm){tbl=tm[1]==='SandboxVars'?null:tm[1];continue;}
    if(line.startsWith('}')){tbl=null;continue;}
    const kvm=line.match(/^(\w+)\s*=\s*(.+?)(?:\s*,\s*(?:--.*)?)?$/);
    if(!kvm) continue;
    const k=kvm[1],v=kvm[2].trim();
    if(k==='SandboxVars'||k==='Version'||k==='VERSION') continue;
    r[tbl?`${tbl}.${k}`:k]=v;
  }
  return r;
}
function applyParsed(pi,fid,parsed){
  const fm=settingMap[fid]; if(!fm) return;
  if(!values[pi][fid]) values[pi][fid]={};
  for(const[rawK,sv] of Object.entries(parsed)){
    let s=fm[rawK];
    if(!s){
      const dot=rawK.indexOf('.');
      if(dot>0){const schemaKey=rawK.slice(dot+1);const luaTable=rawK.slice(0,dot);const cand=fm[schemaKey];if(cand&&cand.luaTable===luaTable) s=cand;}
    }
    if(!s) continue;
    let v=parseFloat(sv);
    if(isNaN(v)) v=(sv==='true'||sv==='1')?1:0;
    values[pi][fid][s.key]=clamp(s,v);
  }
}

// ─── FORMAT OUTPUT ────────────────────────────────────────────────────
function formatIni(pi,isAvg){
  const f=SCHEMA.find(x=>x.id==='ini'); if(!f) return '';
  const L=['# PZ Server Settings — generated by pz-vote',''];
  for(const g of f.groups){
    L.push('# '+g.label);
    for(const s of g.settings){
      const v=isAvg?fmtFile(s,avg3(s,values[0][f.id][s.key],values[1][f.id][s.key],values[2][f.id][s.key])):fmtFile(s,values[pi][f.id][s.key]??s.def);
      L.push(`${s.key}=${v}`);
    }
    L.push('');
  }
  return L.join('\n');
}
function formatLua(pi,isAvg){
  const f=SCHEMA.find(x=>x.id==='sandbox'); if(!f) return '';
  const L=['SandboxVars = {','    Version = 6,'];
  const byTable={};
  for(const g of f.groups) for(const s of g.settings){
    const v=isAvg?fmtFile(s,avg3(s,values[0][f.id][s.key],values[1][f.id][s.key],values[2][f.id][s.key])):fmtFile(s,values[pi][f.id][s.key]??s.def);
    if(s.luaTable){if(!byTable[s.luaTable]) byTable[s.luaTable]=[];byTable[s.luaTable].push([s.key,v]);}
    else L.push(`    ${s.key} = ${v},`);
  }
  for(const[tbl,pairs] of Object.entries(byTable)){
    L.push(`    ${tbl} = {`);
    for(const[k,v] of pairs) L.push(`        ${k} = ${v},`);
    L.push('    },');
  }
  L.push('}');return L.join('\n');
}

// ─── GITHUB ───────────────────────────────────────────────────────────
const RAW_BASE='https://raw.githubusercontent.com/bwinter/pz-vote/main/';
const VOTES_DIR='votes/';
const GH_API='https://api.github.com/repos/bwinter/pz-vote/contents/';
function getToken(){return document.getElementById('gh-token').value.trim();}

async function fetchPlayer(pi){
  const name=document.getElementById('p'+pi).value.trim()||('Player'+(pi+1));
  let loaded=false;
  try{const r=await fetch(RAW_BASE+VOTES_DIR+pi+'_'+name+'.ini');if(r.ok){applyParsed(pi,'ini',parseIni(await r.text()));loaded=true;}}catch(e){}
  try{const r=await fetch(RAW_BASE+VOTES_DIR+pi+'_'+name+'_SandboxVars.lua');if(r.ok){applyParsed(pi,'sandbox',parseLua(await r.text()));loaded=true;}}catch(e){}
  return loaded;
}
async function loadAllFromGitHub(){
  setStatus('Loading from GitHub...');
  let any=false;
  for(let i=0;i<3;i++) if(await fetchPlayer(i)) any=true;
  rebuildControls();updatePresetDropdowns();
  setStatus(any?'Loaded from GitHub — '+new Date().toLocaleTimeString():'No saved configs on GitHub — using defaults');
}
async function reloadPlayer(pi){
  const loaded=await fetchPlayer(pi);
  rebuildControls();updatePresetDropdowns();
  const n=getNames();
  setStatus(loaded?'Loaded '+n[pi]+' from GitHub — '+new Date().toLocaleTimeString():'No saved config for '+n[pi]+' on GitHub');
}
async function ghSha(path){
  try{const r=await fetch(GH_API+path,{headers:{Authorization:'token '+getToken(),Accept:'application/vnd.github+json'}});if(r.ok){const d=await r.json();return d.sha;}}catch(e){}
  return null;
}
async function ghPut(path,content,msg){
  const sha=await ghSha(path);
  const body={message:msg,content:btoa(unescape(encodeURIComponent(content)))};
  if(sha) body.sha=sha;
  const r=await fetch(GH_API+path,{method:'PUT',headers:{Authorization:'token '+getToken(),Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.statusText);}
}
function openSettings(){document.getElementById('settings-panel').classList.add('open');}
function noToken(){
  openSettings();
  const tf=document.getElementById('gh-token');tf.focus();
  tf.style.outline='2px solid #dca';setTimeout(()=>tf.style.outline='',2000);
  setStatus('Add your GitHub token in Settings to enable saving','warn');
  return true;
}
async function commitPlayer(pi){
  if(!getToken()) return noToken();
  const n=getNames();
  setStatus('Saving '+n[pi]+'...');
  try{
    await ghPut(VOTES_DIR+pi+'_'+n[pi]+'.ini',formatIni(pi,false),'Update '+n[pi]+' config');
    await ghPut(VOTES_DIR+pi+'_'+n[pi]+'_SandboxVars.lua',formatLua(pi,false),'Update '+n[pi]+' sandbox');
    await ghPut(VOTES_DIR+'averages.ini',formatIni(null,true),'Update averages');
    await ghPut(VOTES_DIR+'averages_SandboxVars.lua',formatLua(null,true),'Update averages sandbox');
    setStatus('Saved '+n[pi]+' + averages to GitHub','save-ok');
  }catch(e){setStatus('Save failed: '+e.message,'warn');}
}
async function commitAll(){
  if(!getToken()) return noToken();
  if(!confirm('Save all 3 players + averages to GitHub?\nThis overwrites the shared config files.')) return;
  const n=getNames();
  setStatus('Saving all files...');
  try{
    for(let i=0;i<3;i++){
      await ghPut(VOTES_DIR+i+'_'+n[i]+'.ini',formatIni(i,false),'Update '+n[i]+' config');
      await ghPut(VOTES_DIR+i+'_'+n[i]+'_SandboxVars.lua',formatLua(i,false),'Update '+n[i]+' sandbox');
    }
    await ghPut(VOTES_DIR+'averages.ini',formatIni(null,true),'Update averages');
    await ghPut(VOTES_DIR+'averages_SandboxVars.lua',formatLua(null,true),'Update averages sandbox');
    setStatus('Saved 8 files to GitHub','save-ok');
  }catch(e){setStatus('Save failed: '+e.message,'warn');}
}

// ─── LOAD GAME FILES ──────────────────────────────────────────────────
const GAME_BASE='./reference/game_files/';
const PRESET_NAMES=['Apocalypse','Extinction','Outbreak','Rising','SixMonthsLater'];

async function loadGameFiles(){
  setStatus('Loading game files...');
  try{
    const[allowlist,sbJson,...presetTexts]=await Promise.all([
      fetch('./reference/allowlist.json').then(r=>r.json()),
      fetch(GAME_BASE+'Sandbox.json').then(r=>r.json()),
      ...PRESET_NAMES.map(n=>fetch(GAME_BASE+'presets/'+n+'.lua').then(r=>r.text())),
    ]);
    const apoFlat=parseLua(presetTexts[0]);

    // Build loot snaps from Apocalypse.lua factor keys
    LOOT_SNAPS=Object.entries(LOOT_FACTOR_LABELS)
      .map(([k,label])=>[parseFloat(apoFlat[k]||'0'),label])
      .filter(([v])=>v>0)
      .sort((a,b)=>a[0]-b[0]);

    SCHEMA=buildSchema(allowlist,apoFlat,sbJson);

    settingMap={};
    for(const f of SCHEMA){settingMap[f.id]={};for(const g of f.groups) for(const s of g.settings) settingMap[f.id][s.key]=s;}

    // Build PRESETS from .lua files
    PRESETS={};
    PRESET_NAMES.forEach((name,i)=>{
      const flat=parseLua(presetTexts[i]);
      PRESETS[name.toLowerCase()]={note:null,sandbox:buildPresetValues(flat,'sandbox'),ini:{}};
    });

    initValues();
    buildTree();
    loadAllFromGitHub();
  }catch(e){
    setStatus('Failed to load game files: '+e.message,'warn');
    console.error(e);
  }
}

// ─── SCHEMA BUILDER ───────────────────────────────────────────────────
function humanize(key){return key.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase()).trim();}

function detectType(key,rawValue,sbKey,sbJson,annotations){
  if(annotations?.[key]?.type) return annotations[key].type;
  if(sbJson['Sandbox_'+sbKey+'_option1']) return 'enum';
  if(rawValue==='true'||rawValue==='false') return 'bool';
  if(key.includes('Loot')&&!key.includes('Respawn')&&!key.includes('Hours')) return 'lootSelect';
  return 'number';
}

function getEnumOptions(sbKey,sbJson){
  const opts=[];
  for(let i=1;sbJson['Sandbox_'+sbKey+'_option'+i];i++) opts.push(sbJson['Sandbox_'+sbKey+'_option'+i]);
  return opts;
}

function buildPresetValues(flat,fid){
  const vals={};
  for(const[compositeKey,sv] of Object.entries(flat)){
    const dot=compositeKey.indexOf('.');
    const key=dot>=0?compositeKey.slice(dot+1):compositeKey;
    const s=settingMap[fid]?.[key]; if(!s) continue;
    let v=parseFloat(sv);
    if(isNaN(v)) v=sv==='true'?1:0;
    vals[key]=v;
  }
  return vals;
}

function buildSchema(allowlist,apoFlat,sbJson){
  const{sandboxKeyMap={},annotations={},ini,sandbox}=allowlist;

  // Map key → luaTable from parsed Apocalypse.lua (last one wins for ambiguous keys)
  const luaTableOf={};
  for(const compositeKey of Object.keys(apoFlat)){
    const dot=compositeKey.indexOf('.');
    if(dot>=0) luaTableOf[compositeKey.slice(dot+1)]=compositeKey.slice(0,dot);
  }

  const schema=[];

  // INI file — fully defined in allowlist
  if(ini){
    const iniFile={id:'ini',label:'server.ini',ext:'ini',groups:[]};
    for(const g of ini.groups){
      const group={id:g.id,label:g.label,settings:[]};
      for(const s of g.settings){
        group.settings.push({
          key:s.key,label:s.label||humanize(s.key),fid:'ini',
          type:s.type,options:s.options||[],def:s.def??0,
          tooltip:sbJson['Sandbox_'+s.key+'_tooltip']||'',
        });
      }
      iniFile.groups.push(group);
    }
    schema.push(iniFile);
  }

  // Sandbox file — keys from allowlist, metadata from game files
  if(sandbox){
    const sbFile={id:'sandbox',label:'SandboxVars.lua',ext:'lua',groups:[]};
    for(const g of sandbox.groups){
      const group={id:g.id,label:g.label,b42:g.b42||false,settings:[]};
      for(const key of g.keys){
        // Group luaTableHint takes priority for disambiguation (e.g. ZombieLore.Strength vs MultiplierConfig.Strength)
        let luaTable=null;
        let rawValue;
        if(g.luaTableHint&&apoFlat[g.luaTableHint+'.'+key]!==undefined){
          luaTable=g.luaTableHint;
          rawValue=apoFlat[g.luaTableHint+'.'+key];
        } else {
          luaTable=luaTableOf[key]||null;
          rawValue=luaTable?apoFlat[luaTable+'.'+key]:apoFlat[key];
        }

        if(rawValue===undefined&&!annotations[key]) continue;

        const sbKey=sandboxKeyMap[key]||key;
        const type=detectType(key,rawValue||'',sbKey,sbJson,annotations);
        if(type==='number'&&!annotations[key]&&!sbJson['Sandbox_'+sbKey+'_option1']){
          console.warn('buildSchema: no Sandbox.json entry for key:',key,'(tried Sandbox_'+sbKey+')');
        }

        let options=[];
        if(type==='enum') options=annotations[key]?.options||getEnumOptions(sbKey,sbJson);
        else if(type==='lootSelect') options=LOOT_SNAPS;

        let def=rawValue!==undefined?parseFloat(rawValue):0;
        if(isNaN(def)) def=rawValue==='true'?1:0;
        if(annotations[key]?.def!==undefined) def=annotations[key].def;

        group.settings.push({
          key,fid:'sandbox',luaTable,
          label:sbJson['Sandbox_'+sbKey]||sbJson['Sandbox_'+key]||humanize(key),
          type,options,def,b42:g.b42||false,
          tooltip:sbJson['Sandbox_'+sbKey+'_tooltip']||sbJson['Sandbox_'+key+'_tooltip']||'',
        });
      }
      sbFile.groups.push(group);
    }
    schema.push(sbFile);
  }

  return schema;
}

// ─── RENDER ───────────────────────────────────────────────────────────
function updateAvg(s,fid,aid){
  const ae=document.getElementById(aid);
  if(ae) ae.textContent=fmtDisplay(s,avg3(s,values[0][fid][s.key],values[1][fid][s.key],values[2][fid][s.key]));
}

function makeControl(s,cv,p){
  const aid='avg_'+s.fid+'_'+s.key;
  const id='ctl_'+p+'_'+s.fid+'_'+s.key;

  if(s.type==='bool'){
    const chk=document.createElement('input');
    chk.type='checkbox';chk.checked=cv>=0.5;chk.id=id;chk.className='p-check';
    chk.onchange=()=>{values[p][s.fid][s.key]=chk.checked?1:0;updateAvg(s,s.fid,aid);document.getElementById('preset'+p).value='custom';};
    return chk;
  }

  if(s.type==='enum'||s.type==='lootSelect'){
    const sel=document.createElement('select');
    sel.id=id;sel.className='p-select';
    if(s.type==='enum'){
      s.options.forEach((label,i)=>{const o=document.createElement('option');o.value=String(i+1);o.textContent=label;sel.appendChild(o);});
      sel.value=String(Math.round(cv));
    } else {
      s.options.forEach(([v,label])=>{const o=document.createElement('option');o.value=String(v);o.textContent=label;sel.appendChild(o);});
      sel.value=String(nearestLootSnap(cv));
    }
    sel.onchange=()=>{values[p][s.fid][s.key]=parseFloat(sel.value);updateAvg(s,s.fid,aid);document.getElementById('preset'+p).value='custom';};
    return sel;
  }

  const inp=document.createElement('input');
  inp.type='number';inp.step='any';inp.value=cv;inp.id=id;inp.className='p-num';
  inp.oninput=()=>{const v=parseFloat(inp.value);if(!isNaN(v)){values[p][s.fid][s.key]=v;updateAvg(s,s.fid,aid);document.getElementById('preset'+p).value='custom';}};
  return inp;
}

function buildTree(){
  const tree=document.getElementById('tree');tree.innerHTML='';
  for(const f of SCHEMA){
    const fk='file_'+f.id;if(collapsed[fk]===undefined) collapsed[fk]=true;
    const fDiv=document.createElement('div');
    const fRow=document.createElement('div');fRow.className='t-row';
    const fIco=document.createElement('span');fIco.className='t-icon';fIco.id='ico_'+fk;fIco.textContent=collapsed[fk]?'▶':'▼';
    const fLbl=document.createElement('span');fLbl.className='lbl-file';fLbl.textContent=f.label;
    fRow.append(mkI(),fIco,fLbl);
    const fCh=document.createElement('div');fCh.className='t-children'+(collapsed[fk]?' collapsed':'');
    fRow.onclick=()=>{
      tog(fk,fCh,fIco);
      if(collapsed[fk]) for(const g of f.groups){
        const gk='grp_'+f.id+'_'+g.id;
        if(!collapsed[gk]){collapsed[gk]=true;document.getElementById('ico_'+gk).textContent='▶';document.getElementById('gch_'+gk).classList.add('collapsed');}
      }
    };
    fDiv.append(fRow,fCh);

    for(const g of f.groups){
      const gk='grp_'+f.id+'_'+g.id;if(collapsed[gk]===undefined) collapsed[gk]=true;
      const gDiv=document.createElement('div');
      const gRow=document.createElement('div');gRow.className='t-row';
      const gIco=document.createElement('span');gIco.className='t-icon';gIco.id='ico_'+gk;gIco.textContent=collapsed[gk]?'▶':'▼';
      const gLbl=document.createElement('span');gLbl.className='lbl-group';gLbl.textContent=g.label;
      if(g.b42){const t=document.createElement('span');t.className='b42-tag';t.textContent='B42';gLbl.appendChild(t);}
      gRow.append(mkI(),mkI(),gIco,gLbl);
      const gCh=document.createElement('div');gCh.id='gch_'+gk;gCh.className='t-children'+(collapsed[gk]?' collapsed':'');
      gRow.onclick=()=>tog(gk,gCh,gIco);
      gDiv.append(gRow,gCh);

      for(const s of g.settings){
        const sRow=document.createElement('div');sRow.className='s-row';
        const sIco=document.createElement('span');sIco.className='t-icon';sIco.textContent='·';
        const sKey=document.createElement('span');sKey.className='s-key'+(s.b42?' b42':'');
        sKey.textContent=s.key;sKey.title=(s.b42?'[B42] ':'')+s.label;
        const sHead=document.createElement('div');sHead.className='s-head';
        sHead.append(mkI(),mkI(),mkI(),sIco,sKey);
        const slot=document.createElement('span');slot.className='s-info-slot';
        if(s.tooltip){
          sHead.dataset.tip='1';
          const ib=document.createElement('button');ib.className='info-btn';ib.textContent='ℹ';ib.type='button';
          ib.setAttribute('aria-label','Setting description');
          const it=document.createElement('div');it.className='info-tip';it.textContent=s.tooltip;
          slot.appendChild(ib);sHead.appendChild(slot);sHead.appendChild(it);
        }else{
          sHead.appendChild(slot);
        }
        sRow.appendChild(sHead);
        const wrap=document.createElement('div');wrap.className='sliders-wrap';
        const aid='avg_'+f.id+'_'+s.key;
        for(let p=0;p<3;p++){
          const cv=values[p][f.id][s.key]??s.def;
          const col=document.createElement('div');col.className='p-col';
          col.appendChild(makeControl(s,cv,p));
          wrap.appendChild(col);
        }
        const avgSp=document.createElement('span');avgSp.className='s-avg';avgSp.id=aid;
        avgSp.textContent=fmtDisplay(s,avg3(s,values[0][f.id][s.key],values[1][f.id][s.key],values[2][f.id][s.key]));
        wrap.appendChild(avgSp);sRow.appendChild(wrap);gCh.appendChild(sRow);
      }
      fCh.appendChild(gDiv);
    }
    tree.appendChild(fDiv);
  }
}

function rebuildControls(){
  for(const f of SCHEMA) for(const g of f.groups) for(const s of g.settings){
    const aid='avg_'+f.id+'_'+s.key;
    for(let p=0;p<3;p++){
      const v=values[p][f.id][s.key]??s.def;
      const ctl=document.getElementById('ctl_'+p+'_'+f.id+'_'+s.key);
      if(!ctl) continue;
      if(s.type==='bool') ctl.checked=v>=0.5;
      else if(s.type==='lootSelect') ctl.value=String(nearestLootSnap(v));
      else if(s.type==='enum') ctl.value=String(Math.round(v));
      else ctl.value=String(v);
    }
    const ae=document.getElementById(aid);
    if(ae) ae.textContent=fmtDisplay(s,avg3(s,values[0][f.id][s.key],values[1][f.id][s.key],values[2][f.id][s.key]));
  }
}

function tog(k,ch,ico){collapsed[k]=!collapsed[k];ico.textContent=collapsed[k]?'▶':'▼';ch.classList.toggle('collapsed',collapsed[k]);}

// ─── EVENTS ───────────────────────────────────────────────────────────
document.getElementById('btn-settings').onclick=()=>{document.getElementById('settings-panel').classList.toggle('open');};

(()=>{
  const tf=document.getElementById('gh-token');
  const stored=localStorage.getItem('pz-gh-token');
  if(stored){tf.value=stored;tf.classList.add('has-token');}
  tf.addEventListener('input',function(){
    const v=this.value.trim();
    if(v){localStorage.setItem('pz-gh-token',v);this.classList.add('has-token');}
    else{localStorage.removeItem('pz-gh-token');this.classList.remove('has-token');}
  });
})();

document.getElementById('btn-reset').onclick=()=>{initValues();loadAllFromGitHub();};
document.getElementById('btn-save').onclick=commitAll;

[0,1,2].forEach(i=>{
  document.getElementById('preset'+i).addEventListener('change',e=>applyPreset(i,e.target.value));
  document.getElementById('btn-save-'+i).onclick=()=>commitPlayer(i);
  document.getElementById('btn-reload-'+i).onclick=()=>reloadPlayer(i);
});

loadGameFiles();
</script>
