<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PZ Vote — Server Settings</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1e1e;--bg2:#252526;--bg3:#2a2d2e;--bg4:#1a1a1a;
  --border:#333;--border2:#2a2a2a;
  --text:#cccccc;--dim:#8f9aa4;--key:#9cdcfe;--group:#c586c0;
  --file:#569cd6;--avg:#dcdcaa;
  --p0:#4f9ede;--p1:#c58bc0;--p2:#4ec9b0;
  --p0d:#1f4a70;--p1d:#5a3860;--p2d:#1b5a50;
  --accent:#007acc;
  --ind:16px;--icon-w:20px;--key-w:220px;--val-w:80px;--avg-w:76px;
  --key-offset:288px;
  --row-h:26px;--toolbar-h:38px;--header-h:28px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:auto;}
#toolbar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:300;min-height:var(--toolbar-h);flex-wrap:wrap;}
.btn{padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.btn:hover{filter:brightness(1.15);}
.btn:active{filter:brightness(0.9);}
.btn-save{background:#2d7a2d;min-width:120px;}
.btn-reload{background:#555;min-width:120px;}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;}
#modal-overlay.hidden{display:none;}
#modal{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:32px 40px;max-width:440px;width:90%;text-align:center;display:flex;flex-direction:column;gap:16px;}
#modal h2{font-size:16px;color:var(--text);font-weight:600;}
#modal p{font-size:13px;color:var(--dim);line-height:1.6;}
#modal .modal-note{font-size:11px;color:var(--dim);}
#modal .modal-error{color:#e05252;font-size:13px;line-height:1.6;}
#modal-btn-open{align-self:center;padding:8px 24px;font-size:13px;}
#folder-path{font-size:11px;color:var(--dim);font-family:'Consolas','Cascadia Code',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:40px;}
.player-col{display:flex;flex-direction:column;gap:3px;min-width:130px;}
.p-input{width:100%;padding:2px 5px;background:#2d2d2d;border:1px solid #555;border-bottom:2px solid #555;color:var(--text);border-radius:2px;font-size:12px;font-family:'Consolas','Cascadia Code',monospace;}
.p-input:focus{outline:none;border-color:var(--accent);}
#p0{border-bottom-color:var(--p0);}
#p1{border-bottom-color:var(--p1);}
#p2{border-bottom-color:var(--p2);}
.p-preset{width:100%;padding:2px 4px;background:#2d2d2d;border:1px solid #444;color:var(--text);border-radius:2px;font-size:10px;cursor:pointer;font-family:inherit;}
.p-preset:focus{outline:none;border-color:var(--accent);}
select option{background:#2d2d2d;color:var(--text);}
#col-header{display:flex;align-items:stretch;background:var(--bg4);border-bottom:1px solid var(--border);position:sticky;top:var(--toolbar-h);z-index:290;font-size:11px;min-height:var(--header-h);min-width:900px;}
.ch-spacer{width:var(--key-offset);flex-shrink:0;display:flex;flex-direction:column;justify-content:space-around;padding:5px 8px;gap:3px;}
.ch-label{font-family:'Consolas','Cascadia Code',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;}
.ch-p{flex:1;min-width:100px;display:flex;flex-direction:column;gap:3px;padding:5px 5px;border-left:1px solid var(--border2);}
.ch-avg{width:var(--avg-w);flex-shrink:0;text-align:right;color:var(--avg);padding-right:12px;text-transform:uppercase;letter-spacing:.06em;font-size:10px;}
#tree{min-width:900px;}
.t-children.collapsed{display:none;}
.t-row,.s-row{display:flex;align-items:center;min-height:var(--row-h);padding:1px 0;}
.t-row{cursor:pointer;}
.t-row:hover,.s-row:hover{background:var(--bg3);}
.t-indent{width:var(--ind);flex-shrink:0;}
.t-icon{width:var(--icon-w);flex-shrink:0;font-size:9px;color:var(--dim);text-align:center;user-select:none;}
.lbl-file{font-family:'Consolas','Cascadia Code',monospace;color:var(--file);font-size:13px;font-weight:700;padding:0 4px;user-select:none;}
.lbl-group{font-family:'Consolas','Cascadia Code',monospace;color:var(--group);font-size:12px;padding:0 4px;user-select:none;}
.b42-tag{font-size:9px;color:#ce9178;opacity:.8;font-style:italic;margin-left:5px;}
.s-key{width:var(--key-w);flex-shrink:0;font-family:'Consolas','Cascadia Code',monospace;font-size:12px;color:var(--key);padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-key.b42{color:#ce9178;}
.sliders-wrap{display:flex;flex:1;align-items:center;min-width:0;}
.p-col{display:flex;align-items:center;flex:1;min-width:100px;padding:0 5px;gap:4px;border-left:1px solid var(--border2);}
.p-val{width:var(--val-w);flex-shrink:0;font-family:'Consolas','Cascadia Code',monospace;font-size:11px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-col:nth-child(1) .p-val{color:var(--p0);}
.p-col:nth-child(2) .p-val{color:var(--p1);}
.p-col:nth-child(3) .p-val{color:var(--p2);}
input[type=range]{flex:1;min-width:40px;height:3px;-webkit-appearance:none;appearance:none;background:#3c3c3c;border-radius:2px;cursor:pointer;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;border-radius:50%;cursor:pointer;transition:transform .1s;}
input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.3);}
.p-col:nth-child(1) input[type=range]::-webkit-slider-thumb{background:var(--p0);}
.p-col:nth-child(2) input[type=range]::-webkit-slider-thumb{background:var(--p1);}
.p-col:nth-child(3) input[type=range]::-webkit-slider-thumb{background:var(--p2);}
.s-avg{width:var(--avg-w);flex-shrink:0;font-family:'Consolas','Cascadia Code',monospace;font-size:11px;color:var(--avg);text-align:right;padding-right:12px;white-space:nowrap;}
#status{font-size:11px;color:var(--dim);padding:3px 10px;background:var(--bg2);border-bottom:1px solid var(--border2);}
.save-ok{color:#4ec9b0 !important;}
.warn{color:#dcdcaa !important;}
</style>
</head>
<body>
<div id="modal-overlay">
  <div id="modal">
    <h2>&#128194; Select Working Folder</h2>
    <p id="modal-body">Open the folder containing this file.</p>
    <p class="modal-note">Requires Chrome or Edge 86+. Firefox is not supported.</p>
    <button class="btn" id="modal-btn-open">Open Folder</button>
  </div>
</div>
<div id="toolbar">
  <span id="folder-path">No folder selected</span>
  <button class="btn btn-reload" id="btn-reset">🔄 Reload from Disk</button>
  <button class="btn btn-save" id="btn-save">💾 Save</button>
</div>
<div id="col-header">

    <span class="ch-label">Player name</span>
    <span class="ch-label">Preset</span>
  </div>
  <div class="ch-p">
    <input class="p-input" id="p0" value="Diesel">
    <select class="p-preset" id="preset0"><option value="">Defaults</option><option value="apocalypse">Apocalypse</option><option value="outbreak">Outbreak</option><option value="extinction">Extinction</option><option value="rising">Rising</option><option value="custom">Custom</option></select>
  </div>
  <div class="ch-p">

  </div>
  <div class="ch-p">
    <input class="p-input" id="p2" value="SnowCrash">
    <select class="p-preset" id="preset2"><option value="">Defaults</option><option value="apocalypse">Apocalypse</option><option value="outbreak">Outbreak</option><option value="extinction">Extinction</option><option value="rising">Rising</option><option value="custom">Custom</option></select>
  </div>
  <div class="ch-avg">avg</div>
</div>
<div id="status">Click "Open Folder" and select the folder containing this file — settings will be saved there.</div>
<div id="tree"></div>

  settingMap[f.id]={};

}

function initValues(){
  values=[{},{},{}];

// ─── PRESET APPLICATION ───────────────────────────────────────────────
function applyPreset(pi,name){
  if(name==='' || name===undefined) {
    for(const f of SCHEMA) for(const g of f.groups) for(const s of g.settings) values[pi][f.id][s.key]=s.def;
    rebuildSliders();
    const pname=document.getElementById('p'+pi).value||'Player '+(pi+1);
    setStatus(`Reset ${pname} to defaults`);
    return;
  }
  const pr=PRESETS[name]; if(!pr) return;
  if(pr.sandbox) for(const[k,v] of Object.entries(pr.sandbox)){const s=settingMap['sandbox']?.[k];if(s) values[pi]['sandbox'][k]=clamp(s,v);}
  if(pr.ini) for(const[k,v] of Object.entries(pr.ini)){const s=settingMap['ini']?.[k];if(s) values[pi]['ini'][k]=clamp(s,v);}
  rebuildSliders();
  const pname=document.getElementById('p'+pi).value||'Player '+(pi+1);
  const note=pr.note?` — ${pr.note}`:'';
  setStatus(`"${name}" applied to ${pname}${note}`,'warn');
}

// ─── HELPERS ──────────────────────────────────────────────────────────
function clamp(s,v){return Math.max(s.min,Math.min(s.max,v));}
function fmtDisplay(s,v){
  if(s.bool) return v>=0.5?'on':'off';
  if(s.enum){const i=Math.round(v)-s.min;return s.enum[Math.max(0,Math.min(s.enum.length-1,i))];}
  if(s.step<0.1) return parseFloat(v.toFixed(2)).toString();
  if(s.step<1) return parseFloat(v.toFixed(1)).toString();
  return String(Math.round(v));
}
function fmtFile(s,v){
  if(s.bool) return v>=0.5?'true':'false';
  if(s.step<0.1) return parseFloat(v.toFixed(2)).toString();
  if(s.step<1) return parseFloat(v.toFixed(1)).toString();
  return String(Math.round(v));
}
function avg3(s,a,b,c){const x=(a+b+c)/3;return s.step>=1?Math.round(x):x;}
function fillGrad(el){
  const pct=((el.value-el.min)/(el.max-el.min))*100;
  const p=el.dataset.pcol;
  const col=p==='0'?'var(--p0d)':p==='1'?'var(--p1d)':'var(--p2d)';
  el.style.background=`linear-gradient(${col},${col}) no-repeat 0/${pct}% 100%,#3c3c3c`;
}
function getNames(){return[0,1,2].map(i=>document.getElementById('p'+i).value.trim()||'Player'+(i+1));}
function setStatus(m,c){const e=document.getElementById('status');e.textContent=m;e.className=c||'';}

function mkI(){const s=document.createElement('span');s.className='t-indent';return s;}

// ─── PARSE ────────────────────────────────────────────────────────────
function parseIni(text){
  const r={};
  for(const line of text.split('\n')){if(line.startsWith('#')) continue;const eq=line.indexOf('=');if(eq>0) r[line.slice(0,eq).trim()]=line.slice(eq+1).trim();}
  return r;
}
function parseLua(text){
  const r={};const re=/\b(\w+)\s*=\s*([^,}\n\r]+)/g;let m;
  while((m=re.exec(text))!==null){const k=m[1].trim(),v=m[2].trim().replace(/,$/,'');if(k==='SandboxVars'||k==='VERSION') continue;r[k]=v;}
  return r;
}
function applyParsed(pi,fid,parsed){
  const fm=settingMap[fid];if(!fm) return;
  if(!values[pi][fid]) values[pi][fid]={};
  for(const[k,sv] of Object.entries(parsed)){
    if(!fm[k]) continue;
    const s=fm[k];let v=parseFloat(sv);
    if(isNaN(v)) v=(sv==='true'||sv==='1')?1:0;
    values[pi][fid][k]=clamp(s,v);
  }
}

// ─── FORMAT OUTPUT ────────────────────────────────────────────────────
function formatIni(pi,isAvg){
  const f=SCHEMA.find(x=>x.id==='ini');
  const L=['# PZ Server Settings — generated by vote.html',''];
  for(const g of f.groups){
    L.push('# '+g.label);
    for(const s of g.settings){
      const v=isAvg?fmtFile(s,avg3(s,values[0][f.id][s.key],values[1][f.id][s.key],values[2][f.id][s.key])):fmtFile(s,values[pi][f.id][s.key]??s.def);
      L.push(`${s.key}=${v}`);
    }
    L.push('');
  }
  return L.join('\n');
}
function formatLua(pi,isAvg){
  const f=SCHEMA.find(x=>x.id==='sandbox');
  const L=['SandboxVars = {','    VERSION = 4,'];
  for(const g of f.groups){
    L.push('    -- '+(g.b42?'[B42] ':'')+g.label);
    for(const s of g.settings){
      const v=isAvg?fmtFile(s,avg3(s,values[0][f.id][s.key],values[1][f.id][s.key],values[2][f.id][s.key])):fmtFile(s,values[pi][f.id][s.key]??s.def);
      L.push(`    ${s.key} = ${v},`+(s.b42?' -- B42 (verify key name)':''));
    }
    L.push('');
  }
  L.push('}');return L.join('\n');
}

// ─── FILE I/O ─────────────────────────────────────────────────────────
async function wf(dir,name,content){
  const h=await dir.getFileHandle(name,{create:true});
  const w=await h.createWritable();await w.write(content);await w.close();
}
async function loadFromDir(){
  if(!dirHandle) return;
  const found={};
  for await(const entry of dirHandle.values()){
    if(entry.kind!=='file') continue;
    const m1=entry.name.match(/^(\d)_(.+)\.ini$/);if(m1) found['ini_'+m1[1]]={name:m1[2],entry};
    const m2=entry.name.match(/^(\d)_(.+)_SandboxVars\.lua$/);if(m2) found['lua_'+m2[1]]={name:m2[2],entry};
  }
  for(let i=0;i<3;i++){
    if(found['ini_'+i]) document.getElementById('p'+i).value=found['ini_'+i].name;
    else if(found['lua_'+i]) document.getElementById('p'+i).value=found['lua_'+i].name;
  }
  for(let i=0;i<3;i++){
    if(found['ini_'+i]){const file=await found['ini_'+i].entry.getFile();applyParsed(i,'ini',parseIni(await file.text()));}
    if(found['lua_'+i]){const file=await found['lua_'+i].entry.getFile();applyParsed(i,'sandbox',parseLua(await file.text()));}
  }
}
async function saveFiles(){
  if(!dirHandle){showModal();return;}
  const n=getNames();
  for(let i=0;i<3;i++){await wf(dirHandle,`${i}_${n[i]}.ini`,formatIni(i,false));await wf(dirHandle,`${i}_${n[i]}_SandboxVars.lua`,formatLua(i,false));}
  await wf(dirHandle,'averages.ini',formatIni(null,true));
  await wf(dirHandle,'averages_SandboxVars.lua',formatLua(null,true));
  setStatus(`Saved 8 files to ${dirHandle.name} — ${new Date().toLocaleTimeString()}`,'save-ok');
  const b=document.getElementById('btn-save');const o=b.innerHTML;b.innerHTML='&#10003; Saved!';
  setTimeout(()=>b.innerHTML=o,1800);
}

// ─── RENDER ───────────────────────────────────────────────────────────
function buildTree(){
  const tree=document.getElementById('tree');tree.innerHTML='';
  for(const f of SCHEMA){
    const fk='file_'+f.id;if(collapsed[fk]===undefined) collapsed[fk]=false;
    const fDiv=document.createElement('div');
    const fRow=document.createElement('div');fRow.className='t-row';
    const fIco=document.createElement('span');fIco.className='t-icon';fIco.id='ico_'+fk;fIco.textContent=collapsed[fk]?'▶':'▼';
    const fLbl=document.createElement('span');fLbl.className='lbl-file';fLbl.textContent=f.label;
    fRow.append(mkI(),fIco,fLbl);
    const fCh=document.createElement('div');fCh.className='t-children'+(collapsed[fk]?' collapsed':'');
    fRow.onclick=()=>{
      tog(fk,fCh,fIco);
      if(collapsed[fk]) for(const g of f.groups){
        const gk='grp_'+f.id+'_'+g.id;
        if(!collapsed[gk]){collapsed[gk]=true;document.getElementById('ico_'+gk).textContent='▶';document.getElementById('gch_'+gk).classList.add('collapsed');}
      }
    };
    fDiv.append(fRow,fCh);

    for(const g of f.groups){
      const gk='grp_'+f.id+'_'+g.id;if(collapsed[gk]===undefined) collapsed[gk]=false;
      const gDiv=document.createElement('div');
      const gRow=document.createElement('div');gRow.className='t-row';
      const gIco=document.createElement('span');gIco.className='t-icon';gIco.id='ico_'+gk;gIco.textContent=collapsed[gk]?'▶':'▼';
      const gLbl=document.createElement('span');gLbl.className='lbl-group';
      gLbl.textContent=g.label;
      if(g.b42){const t=document.createElement('span');t.className='b42-tag';t.textContent='B42';gLbl.appendChild(t);}
      gRow.append(mkI(),mkI(),gIco,gLbl);
      const gCh=document.createElement('div');gCh.id='gch_'+gk;gCh.className='t-children'+(collapsed[gk]?' collapsed':'');
      gRow.onclick=()=>tog(gk,gCh,gIco);
      gDiv.append(gRow,gCh);

      for(const s of g.settings){
        const sRow=document.createElement('div');sRow.className='s-row';
        const sIco=document.createElement('span');sIco.className='t-icon';sIco.textContent='·';
        const sKey=document.createElement('span');sKey.className='s-key'+(s.b42?' b42':'');
        sKey.textContent=s.key;
        sKey.title=(s.b42?'[B42] ':'')+s.label+' ('+s.min+' – '+s.max+')';
        sRow.append(mkI(),mkI(),mkI(),sIco,sKey);
        const wrap=document.createElement('div');wrap.className='sliders-wrap';
        const aid='avg_'+f.id+'_'+s.key;
        for(let p=0;p<3;p++){
          const cv=values[p][f.id][s.key]??s.def;
          const col=document.createElement('div');col.className='p-col';
          const vs=document.createElement('span');vs.className='p-val';vs.id='val_'+p+'_'+f.id+'_'+s.key;vs.textContent=fmtDisplay(s,cv);
          const rng=document.createElement('input');rng.type='range';rng.min=s.min;rng.max=s.max;rng.step=s.step;rng.value=cv;
          rng.id='rng_'+p+'_'+f.id+'_'+s.key;rng.dataset.pcol=String(p);fillGrad(rng);
          rng.oninput=()=>{
            const v=parseFloat(rng.value);values[p][f.id][s.key]=v;vs.textContent=fmtDisplay(s,v);fillGrad(rng);
            const ae=document.getElementById(aid);
            if(ae){ae.textContent=fmtDisplay(s,avg3(s,values[0][f.id][s.key],values[1][f.id][s.key],values[2][f.id][s.key]));}
            document.getElementById('preset'+p).value='custom';
          };
          col.append(vs,rng);wrap.appendChild(col);
        }
        const avgSp=document.createElement('span');avgSp.className='s-avg';avgSp.id=aid;
        avgSp.textContent=fmtDisplay(s,avg3(s,values[0][f.id][s.key],values[1][f.id][s.key],values[2][f.id][s.key]));
        wrap.appendChild(avgSp);sRow.appendChild(wrap);gCh.appendChild(sRow);
      }
      fCh.appendChild(gDiv);
    }
    tree.appendChild(fDiv);
  }
}

function rebuildSliders(){
  for(const f of SCHEMA) for(const g of f.groups) for(const s of g.settings) for(let p=0;p<3;p++){
    const rng=document.getElementById('rng_'+p+'_'+f.id+'_'+s.key);
    const vs=document.getElementById('val_'+p+'_'+f.id+'_'+s.key);
    const ae=document.getElementById('avg_'+f.id+'_'+s.key);
    const v=values[p][f.id][s.key]??s.def;
    if(rng){rng.value=v;fillGrad(rng);}
    if(vs) vs.textContent=fmtDisplay(s,v);
    if(p===2&&ae) ae.textContent=fmtDisplay(s,avg3(s,values[0][f.id][s.key],values[1][f.id][s.key],values[2][f.id][s.key]));
  }
}

function tog(k,ch,ico){collapsed[k]=!collapsed[k];ico.textContent=collapsed[k]?'▶':'▼';ch.classList.toggle('collapsed',collapsed[k]);}

// ─── MODAL ────────────────────────────────────────────────────────────
function showModal(){document.getElementById('modal-overlay').classList.remove('hidden');}
function hideModal(){document.getElementById('modal-overlay').classList.add('hidden');}

async function openFolder(){
  try{
    dirHandle=await window.showDirectoryPicker({mode:'readwrite'});
    document.getElementById('folder-path').textContent=dirHandle.name+' /';
    setStatus('Loading from '+dirHandle.name+'...');
    hideModal();
    await loadFromDir();buildTree();
    setStatus('Loaded from '+dirHandle.name+' — '+new Date().toLocaleTimeString());
  }catch(e){if(e.name!=='AbortError') setStatus('Error: '+e.message);}
}

// ─── EVENTS ───────────────────────────────────────────────────────────
document.getElementById('modal-btn-open').onclick=openFolder;
document.getElementById('btn-save').onclick=saveFiles;

document.getElementById('btn-reset').onclick=async()=>{
  if(dirHandle){
    setStatus('Reloading from disk...');
    initValues();await loadFromDir();rebuildSliders();
    setStatus('Reloaded from '+dirHandle.name+' — '+new Date().toLocaleTimeString());
  } else {
    showModal();
  }
};

[0,1,2].forEach(i=>{
  document.getElementById('preset'+i).addEventListener('change',e=>applyPreset(i,e.target.value));
});

if(!window.showDirectoryPicker){
  document.getElementById('modal-body').innerHTML='This tool requires the File System Access API.<br>Open in <strong>Chrome or Edge 86+</strong> — Firefox is not supported.';
  document.getElementById('modal-body').className='modal-error';
  document.getElementById('modal-btn-open').disabled=true;
  document.getElementById('modal-btn-open').style.opacity='0.4';
} else {
  buildTree();
}
</script>
</body>
</html>
